            padding: 10px 25px;
            font-size: 12px;
            cursor: pointer;
            border-left: 3px solid transparent;
            transition: 0.1s;
            display: flex;
            justify-content: space-between;
            align-items: center;

        .top-bar { padding: 20px 40px; background: var(--sidebar); border-bottom: 1px solid var(--border); display: flex; gap: 20px; align-items: center; }

        .category-block { margin-bottom: 80px; }
        .category-title { font-weight: 900; font-size: 28px; color: var(--text-bright); margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid var(--accent); }

        /* Payload Cards */
        .payload-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 15px;
            position: relative;
            transition: 0.2s;
        }
        .payload-card:hover { border-color: var(--accent); }

        .payload-body {
            font-family: 'JetBrains Mono', monospace;
            font-size: 13px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-all;
            color: var(--text);
            padding-right: 80px;
        }

        .copy-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: var(--border);
            border: none;
            color: var(--text-bright);
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 10px;
            font-weight: 700;
        }
        .copy-btn:hover { background: var(--accent); }

        .turn-label { color: var(--accent); font-weight: bold; display: block; margin-top: 15px; border-top: 1px solid #30363d; padding-top: 10px; }
        #toast { position: fixed; bottom: 30px; right: 30px; background: var(--success); color: white; padding: 15px 30px; border-radius: 4px; font-weight: bold; display: none; z-index: 1000; }

const navList = document.getElementById('navList');
const contentArea = document.getElementById('contentArea');
const searchInput = document.getElementById('searchInput');
const counter = document.getElementById('statCounter');

// SECURITY: Function to convert raw strings into escaped HTML entities
function escapeHTML(str) {
    if (!str) return '';
    return str.replace(/[&<>"']/g, function(m) {
        return {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#39;'
        }[m];
    });
}

function render() {
    navList.innerHTML = '';
    contentArea.innerHTML = '';
    const query = searchInput.value.toLowerCase();
    let totalPayloads = 0;

    Object.keys(library).forEach((cat, idx) => {
        // Unique payloads only
        const uniqueItems = [...new Set(library[cat])];
        const filtered = uniqueItems.filter(item => item.toLowerCase().includes(query));

        if (filtered.length === 0) return;

        // Sidebar link
        const navItem = document.createElement('div');
        navItem.className = 'nav-item';
        navItem.innerHTML = `<span>${escapeHTML(cat)}</span> <span class="count-pill">${filtered.length}</span>`;
        navItem.onclick = () => document.getElementById(`cat-${idx}`).scrollIntoView();
        navList.appendChild(navItem);

        // Content Section
        const section = document.createElement('div');
        section.className = 'category-block';
        section.id = `cat-${idx}`;
        section.innerHTML = `<h2 class="category-title">${escapeHTML(cat)}</h2>`;

        filtered.forEach(p => {
            totalPayloads++;
            const card = document.createElement('div');
            card.className = 'payload-card';
            
            // Format turns and Attack IDs visually (but securely)
            const safeText = escapeHTML(p)
                .replace(/(Turn \d+:)/g, '<span class="turn-label">$1</span>')
                .replace(/^([A-Z]{2,3}-\d{3}:)/g, '<strong style="color:var(--accent)">$1</strong>');

            card.innerHTML = `
                <div class="payload-body">${safeText}</div>
                <button class="copy-btn">COPY</button>
            `;
            
            // Ensure copying uses the RAW payload, not the escaped one
            card.querySelector('.copy-btn').onclick = function() {
                copyToClipboard(this, p);
            };

            section.appendChild(card);
        });

        contentArea.appendChild(section);
    });

    counter.innerText = `${totalPayloads} Verified Payloads Loaded`;
}

function copyToClipboard(btn, text) {
    navigator.clipboard.writeText(text).then(() => {
        const toast = document.getElementById('toast');
        toast.style.display = 'block';
        btn.innerText = 'COPIED';
        btn.style.background = '#238636';
        setTimeout(() => { 
            toast.style.display = 'none'; 
            btn.innerText = 'COPY';
            btn.style.background = 'var(--border)';
        }, 2000);
    });
}

searchInput.addEventListener('input', render);
render(); // Initial Load
